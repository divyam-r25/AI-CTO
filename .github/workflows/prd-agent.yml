name: PRD Agent Planner

on:
  pull_request:
    paths:
      - "examples/**/*.md"
      - "prd/**/*.md"
      - "src/lib/**"
      - "skills/**"
      - "scripts/run-agent.ts"
      - ".github/workflows/prd-agent.yml"
  workflow_dispatch:
    inputs:
      prd_path:
        description: "PRD markdown path"
        required: false
        default: "examples/sample-prd.md"
      mode:
        description: "Planning mode"
        required: false
        default: "scalable-startup"
      honesty:
        description: "Challenge mode"
        required: false
        default: "brutal"

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm run test:contracts

      - name: Resolve Planner Inputs
        id: resolve
        shell: bash
        run: |
          PRD_PATH="examples/sample-prd.md"
          MODE="scalable-startup"
          HONESTY="brutal"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.prd_path }}" ]]; then
              PRD_PATH="${{ inputs.prd_path }}"
            fi
            if [[ -n "${{ inputs.mode }}" ]]; then
              MODE="${{ inputs.mode }}"
            fi
            if [[ -n "${{ inputs.honesty }}" ]]; then
              HONESTY="${{ inputs.honesty }}"
            fi
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            CHANGED_PRD="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^(examples|prd)/.*\.md$' | head -n 1 || true)"

            if [[ -n "$CHANGED_PRD" ]]; then
              PRD_PATH="$CHANGED_PRD"
            fi
          fi

          echo "Using PRD path: $PRD_PATH"
          echo "Using mode: $MODE"
          echo "Using honesty mode: $HONESTY"

          echo "prd_path=$PRD_PATH" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "honesty=$HONESTY" >> "$GITHUB_OUTPUT"

      - name: Run AI CTO planner
        run: npm run agent:run -- --prd "${{ steps.resolve.outputs.prd_path }}" --mode "${{ steps.resolve.outputs.mode }}" --honesty "${{ steps.resolve.outputs.honesty }}"

      - name: Upload generated plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-cto-generated-plan
          path: |
            docs/generated/*.md
            docs/architecture.md
            docs/roadmap.md
            docs/risks.md

      - name: Build PR summary comment
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          REPORT="docs/generated/report.md"
          RISKS="docs/generated/risks.md"
          FAILURE="docs/generated/failure-prediction.md"
          OUT=".ai-cto-pr-summary.md"

          {
            echo "<!-- ai-cto-agent-summary -->"
            echo "## AI CTO Auto Plan"
            echo ""
            echo "### Verdict Snapshot"
            if [[ -f "$REPORT" ]]; then
              grep -m 1 "Final Verdict:" "$REPORT" || echo "- Final Verdict: not found"
              grep -m 1 "Confidence:" "$REPORT" || echo "- Confidence: not found"
            else
              echo "- Report artifact not found"
            fi
            echo ""
            echo "### Top Risks"
            if [[ -f "$RISKS" ]]; then
              grep "RPN" "$RISKS" | head -n 3 || echo "- No risk lines found"
            else
              echo "- Risks artifact not found"
            fi
            echo ""
            echo "### Failure Prediction"
            if [[ -f "$FAILURE" ]]; then
              grep -m 1 "Primary failure reason:" "$FAILURE" || head -n 4 "$FAILURE"
            else
              echo "- Failure artifact not found"
            fi
            echo ""
            echo "_Generated by PRD Agent Planner workflow._"
          } > "$OUT"

      - name: Upsert PR summary comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- ai-cto-agent-summary -->";
            const body = fs.readFileSync(".ai-cto-pr-summary.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return typeof comment.body === "string" && comment.body.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
